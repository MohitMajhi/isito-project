name: Docker Image CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  changes:
    runs-on: ubuntu-latest

    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}

    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend: ['frontend/**']
            backend: ['backend/**']

  build-frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Frontend
        run: |
          docker build \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/frontend-app:${{ github.sha }} \
            ./frontend

      # Only push on master
      - name: Login to Docker Hub
        if: github.ref == 'refs/heads/master'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Frontend
        if: github.ref == 'refs/heads/master'
        run: |
          docker push \
            ${{ secrets.DOCKERHUB_USERNAME }}/frontend-app:${{ github.sha }}

  build-backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Backend
        run: |
          docker build \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/backend-app:${{ github.sha }} \
            ./backend

      # Only push on master
      - name: Login to Docker Hub
        if: github.ref == 'refs/heads/master'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Backend
        if: github.ref == 'refs/heads/master'
        run: |
          docker push \
            ${{ secrets.DOCKERHUB_USERNAME }}/backend-app:${{ github.sha }}