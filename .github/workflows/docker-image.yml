name: Docker Image CI

on:
  push:
    branches:
      - '**'
    paths:
      - 'apps/**'

  pull_request:
    branches:
      - '**'
    paths:
      - 'apps/**'

jobs:
  changes:
    runs-on: ubuntu-latest

    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}

    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend: ['apps/frontend/**']
            backend: ['apps/backend/**']

  build-frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Frontend
        run: |
          docker build \
            -f apps/frontend/Dockerfile \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/istio-fe:${{ github.sha }} \
            .

      # Only push on master
      - name: Login to Docker Hub
        if: github.ref == 'refs/heads/master'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Frontend
        if: github.ref == 'refs/heads/master'
        run: |
          docker push \
            ${{ secrets.DOCKERHUB_USERNAME }}/istio-fe:${{ github.sha }}

  build-backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Backend
        run: |
          docker build \
            -f apps/backend/Dockerfile \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/istio-api:${{ github.sha }} \
            .

      # Only push on master
      - name: Login to Docker Hub
        if: github.ref == 'refs/heads/master'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Backend
        if: github.ref == 'refs/heads/master'
        run: |
          docker push \
            ${{ secrets.DOCKERHUB_USERNAME }}/istio-api:${{ github.sha }}
